<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee quiz </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="mainContent">
            <img src="./img/mainCoffee.png" alt="" width="50px" class="imgMainCoffee">
            <h1 class="mainText">Your Perfect Cup</h1>
            <p class="mainQuestion">Answer a few quick questions and discover your ideal coffee order</p>
            <button class="btn">Start quiz ></button>
        </div>
        <div class="answers">
            <div class="answerName">
                <p>Your selections</p>
            </div>
            <div>
                <ul class="answer">
                    <li>
                        No selections yet
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <script type="module"  src="script.js"></script>
</body>

</html>
